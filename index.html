<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0D0D0D">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Calendar Update</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&family=Geist:wght@400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0D0D0D;
      --surface: #131313;
      --surface-container-low: #1c1b1b;
      --surface-container: #201f1f;
      --surface-container-high: #2a2a2a;
      --primary: #6ee591;
      --primary-container: #50c878;
      --on-surface: #e5e2e1;
      --on-surface-variant: #bdcabc;
      --outline: #879487;
      --outline-variant: #3e4a3f;
    }

    body {
      font-family: 'Geist', -apple-system, sans-serif;
      background: #090909;
      color: var(--on-surface);
      height: 100dvh;
      overflow: hidden;
      touch-action: pan-y;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      height: 72px;
      background: rgba(19, 19, 19, 0.4);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(62, 74, 63, 0.3);
    }

    .header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--on-surface-variant);
      cursor: pointer;
      padding: 8px;
      transition: color 0.2s;
    }

    .header-btn:active { color: var(--primary); }

    .header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--on-surface-variant);
    }

    #progressBar {
      position: fixed;
      top: 72px;
      left: 0;
      width: 100%;
      display: flex;
      gap: 8px;
      padding: 16px 20px 0;
      z-index: 40;
    }

    .progress-seg {
      flex: 1;
      height: 2px;
      background: rgba(189, 202, 188, 0.2);
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    .progress-seg.active::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }


    .screens-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      margin-top: 72px;
    }

    .screens {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .screen {
      min-width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px;
      gap: 24px;
    }

    .screen-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--on-surface);
    }

    .text-input {
      width: 100%;
      max-width: 340px;
      height: 56px;
      padding: 0 24px;
      font-size: 16px;
      font-family: 'Geist', sans-serif;
      border: 1px solid rgba(62, 74, 63, 0.5);
      border-radius: 4px;
      background: rgba(28, 27, 27, 0.4);
      color: var(--on-surface);
      text-align: center;
      outline: none;
      transition: all 0.3s;
    }

    .text-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(110, 229, 145, 0.3);
    }

    .text-input::placeholder { color: rgba(189, 202, 188, 0.4); }

    /* Radio buttons */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border: 1px solid rgba(62, 74, 63, 0.5);
      border-radius: 4px;
      background: rgba(28, 27, 27, 0.4);
      cursor: pointer;
      transition: all 0.2s;
    }

    .radio-option:active,
    .radio-option.selected {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(110, 229, 145, 0.3);
    }

    .radio-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(135, 148, 135, 0.5);
      position: relative;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .radio-option.selected .radio-dot {
      border-color: var(--primary);
    }

    .radio-option.selected .radio-dot::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 8px rgba(110, 229, 145, 0.4);
    }

    .radio-label {
      font-family: 'Geist', sans-serif;
      font-size: 16px;
      color: var(--on-surface);
    }

    .radio-option.selected .radio-label {
      color: var(--primary);
    }

    /* Canvas */
    .canvas-container {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 4/3;
      border: 1px solid rgba(62, 74, 63, 0.5);
      border-radius: 4px;
      background: rgba(28, 27, 27, 0.4);
      backdrop-filter: blur(10px);
      position: relative;
      touch-action: none;
      transition: all 0.3s;
    }

    .canvas-container.drawing {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(110, 229, 145, 0.3);
    }

    .canvas-container canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 3px;
    }

    .canvas-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(189, 202, 188, 0.35);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      text-align: center;
      line-height: 1.6;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .canvas-container.has-content .canvas-placeholder { opacity: 0; }

    .recognised-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      min-height: 24px;
      color: var(--primary);
      text-shadow: 0 0 12px rgba(110, 229, 145, 0.4);
    }

    .recognised-value.loading {
      color: var(--on-surface-variant);
      font-weight: 400;
      font-size: 13px;
      text-shadow: none;
    }

    .input-mode-toggle {
      display: flex;
      gap: 4px;
      padding: 3px;
      background: rgba(51, 51, 51, 0.3);
      border: 1px solid rgba(62, 74, 63, 0.3);
      border-radius: 4px;
    }

    .toggle-btn {
      padding: 6px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      background: transparent;
      color: var(--on-surface-variant);
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      background: rgba(110, 229, 145, 0.15);
      color: var(--primary);
    }

    .handwrite-mode, .type-mode {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .type-mode { display: none; }
    .type-mode.active { display: flex; }
    .handwrite-mode.active { display: flex; }
    .handwrite-mode:not(.active) { display: none; }

    .canvas-actions {
      display: flex;
      gap: 12px;
    }

    .btn-small {
      padding: 8px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(135, 148, 135, 0.3);
      border-radius: 2px;
      background: rgba(51, 51, 51, 0.3);
      color: var(--on-surface-variant);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-small:active {
      background: rgba(110, 229, 145, 0.1);
      border-color: var(--primary);
      color: var(--primary);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 28px;
      position: relative;
      z-index: 10;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--primary);
      border-radius: 2px;
      background: var(--surface);
      color: var(--primary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:active {
      background: rgba(110, 229, 145, 0.1);
      box-shadow: 0 0 15px rgba(110, 229, 145, 0.4);
    }

    .nav-btn.hidden { visibility: hidden; }

    .nav-btn.submit {
      background: var(--primary);
      color: #003919;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(110, 229, 145, 0.4);
    }

    .nav-btn.submit:active { background: var(--primary-container); }
    .nav-btn .arrow { font-size: 16px; }

    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .settings-overlay.open { display: flex; }

    .settings-panel {
      background: rgba(51, 51, 51, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(135, 148, 135, 0.2);
      border-radius: 8px;
      padding: 28px 24px;
      width: 90%;
      max-width: 380px;
      max-height: 80dvh;
      overflow-y: auto;
    }

    .settings-panel h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--on-surface);
    }

    .settings-panel label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--on-surface-variant);
    }

    .settings-panel input, .settings-panel select {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: 'Geist', sans-serif;
      border: 1px solid rgba(62, 74, 63, 0.5);
      border-radius: 4px;
      margin-bottom: 16px;
      background: rgba(28, 27, 27, 0.6);
      color: var(--on-surface);
      outline: none;
      transition: all 0.3s;
    }

    .settings-panel input:focus, .settings-panel select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(110, 229, 145, 0.3);
    }

    .settings-panel select option { background: #1c1b1b; }

    .settings-panel .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .settings-panel .btn-row button {
      flex: 1;
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .settings-panel .btn-save {
      background: var(--primary);
      color: #003919;
      border: 1px solid var(--primary);
    }

    .settings-panel .btn-cancel {
      background: transparent;
      color: var(--on-surface-variant);
      border: 1px solid rgba(135, 148, 135, 0.3);
    }

    .settings-panel .btn-google {
      width: 100%;
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--primary);
      border-radius: 2px;
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.2s;
    }

    .settings-panel .btn-google:active {
      background: rgba(110, 229, 145, 0.1);
      box-shadow: 0 0 15px rgba(110, 229, 145, 0.4);
    }

    .settings-panel .btn-google.connected {
      background: rgba(110, 229, 145, 0.1);
      box-shadow: 0 0 10px rgba(110, 229, 145, 0.2);
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(51, 51, 51, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(110, 229, 145, 0.3);
      border-radius: 4px;
      color: var(--primary);
      padding: 12px 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(110, 229, 145, 0.2);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <button class="header-btn" style="visibility:hidden">
        <span class="material-symbols-outlined">close</span>
      </button>
      <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbFAhkO1MwWSGOZ78zvayHb4JnZTaN8kfh8h7qytrPHbICBlkk_W06MkUTdzs9WBHH8VymOShj8YXqcMhfjjsOPNOeFMsFwPmDVbIc7l_D7FL4EqCCApVB-MZVRgc_dNpLmq7P0odMKKdXDimH-kxTBjnGRAxfnBGiAWkSJcvL-gXKg_ICqQQBMQjLeG9ak58Jua63OL77Ux5PJYvnvk19DnWDRXjVaF-Ij7B_3IlqOFCVoQVfKfWwS8EJ6M3Rbd_2oYkBI73CYQ0k" alt="Calendar Update" style="height:56px;width:auto;object-fit:contain;">
      <button class="header-btn" onclick="toggleSettings()">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </header>

    <div id="progressBar"></div>

    <canvas id="bg-canvas"></canvas>

    <div class="screens-wrapper">
      <div class="screens" id="screens">

        <!-- 0: Title -->
        <div class="screen" data-screen="title">
          <div class="screen-label">Title</div>
          <input class="text-input" id="titleInput" type="text" placeholder="Type title here" autocomplete="off">
        </div>

        <!-- 1: Event Type -->
        <div class="screen" data-screen="eventType">
          <div class="screen-label">Event Type</div>
          <div class="radio-group">
            <div class="radio-option selected" onclick="selectEventType('single')">
              <div class="radio-dot"></div>
              <div class="radio-label">Single-day event</div>
            </div>
            <div class="radio-option" onclick="selectEventType('multi')">
              <div class="radio-dot"></div>
              <div class="radio-label">Multi-day event</div>
            </div>
          </div>
        </div>

        <!-- 2: Full Day? -->
        <div class="screen" data-screen="fullDay">
          <div class="screen-label">Full Day?</div>
          <div class="radio-group">
            <div class="radio-option selected" id="fullDayYes" onclick="selectFullDay(true)">
              <div class="radio-dot"></div>
              <div class="radio-label">Yes — All day</div>
            </div>
            <div class="radio-option" id="fullDayNo" onclick="selectFullDay(false)">
              <div class="radio-dot"></div>
              <div class="radio-label">No — Specific times</div>
            </div>
          </div>
        </div>

        <!-- 3: Date (Start) -->
        <div class="screen" data-screen="dateStart">
          <div class="screen-label" id="dateStartLabel">Date (Start)</div>
          <div class="input-mode-toggle">
            <button class="toggle-btn active" onclick="setInputMode('dateStart','handwrite')">Write</button>
            <button class="toggle-btn" onclick="setInputMode('dateStart','type')">Type</button>
          </div>
          <div class="handwrite-mode active" id="dateStartHandwrite">
            <div class="canvas-container" id="dateStartCanvasContainer">
              <canvas id="dateStartCanvas"></canvas>
              <div class="canvas-placeholder">Write date here<br>(dd/mm/yy)</div>
            </div>
            <div class="recognised-value" id="dateStartValue"></div>
            <div class="canvas-actions">
              <button class="btn-small" onclick="clearCanvas('dateStart')">Clear</button>
              <button class="btn-small" onclick="recognise('dateStart')">Recognise</button>
            </div>
          </div>
          <div class="type-mode" id="dateStartType">
            <input class="text-input" id="dateStartTypedInput" type="text" placeholder="dd/mm/yy" autocomplete="off">
          </div>
        </div>

        <!-- 3: Date (End) — only for multi-day -->
        <div class="screen" data-screen="dateEnd">
          <div class="screen-label">Date (End)</div>
          <div class="input-mode-toggle">
            <button class="toggle-btn active" onclick="setInputMode('dateEnd','handwrite')">Write</button>
            <button class="toggle-btn" onclick="setInputMode('dateEnd','type')">Type</button>
          </div>
          <div class="handwrite-mode active" id="dateEndHandwrite">
            <div class="canvas-container" id="dateEndCanvasContainer">
              <canvas id="dateEndCanvas"></canvas>
              <div class="canvas-placeholder">Write end date here<br>(dd/mm/yy)</div>
            </div>
            <div class="recognised-value" id="dateEndValue"></div>
            <div class="canvas-actions">
              <button class="btn-small" onclick="clearCanvas('dateEnd')">Clear</button>
              <button class="btn-small" onclick="recognise('dateEnd')">Recognise</button>
            </div>
          </div>
          <div class="type-mode" id="dateEndType">
            <input class="text-input" id="dateEndTypedInput" type="text" placeholder="dd/mm/yy" autocomplete="off">
          </div>
        </div>

        <!-- 4: Time (Start) -->
        <div class="screen" data-screen="timeStart">
          <div class="screen-label">Time (Start)</div>
          <div class="input-mode-toggle">
            <button class="toggle-btn active" onclick="setInputMode('timeStart','handwrite')">Write</button>
            <button class="toggle-btn" onclick="setInputMode('timeStart','type')">Type</button>
          </div>
          <div class="handwrite-mode active" id="timeStartHandwrite">
            <div class="canvas-container" id="timeStartCanvasContainer">
              <canvas id="timeStartCanvas"></canvas>
              <div class="canvas-placeholder">Write start time here<br>(hh:mm am/pm)</div>
            </div>
            <div class="recognised-value" id="timeStartValue"></div>
            <div class="canvas-actions">
              <button class="btn-small" onclick="clearCanvas('timeStart')">Clear</button>
              <button class="btn-small" onclick="recognise('timeStart')">Recognise</button>
            </div>
          </div>
          <div class="type-mode" id="timeStartType">
            <input class="text-input" id="timeStartTypedInput" type="text" placeholder="hh:mm am/pm" autocomplete="off">
          </div>
        </div>

        <!-- 5: Time (End) -->
        <div class="screen" data-screen="timeEnd">
          <div class="screen-label">Time (End)</div>
          <div class="input-mode-toggle">
            <button class="toggle-btn active" onclick="setInputMode('timeEnd','handwrite')">Write</button>
            <button class="toggle-btn" onclick="setInputMode('timeEnd','type')">Type</button>
          </div>
          <div class="handwrite-mode active" id="timeEndHandwrite">
            <div class="canvas-container" id="timeEndCanvasContainer">
              <canvas id="timeEndCanvas"></canvas>
              <div class="canvas-placeholder">Write end time here<br>(hh:mm am/pm)</div>
            </div>
            <div class="recognised-value" id="timeEndValue"></div>
            <div class="canvas-actions">
              <button class="btn-small" onclick="clearCanvas('timeEnd')">Clear</button>
              <button class="btn-small" onclick="recognise('timeEnd')">Recognise</button>
            </div>
          </div>
          <div class="type-mode" id="timeEndType">
            <input class="text-input" id="timeEndTypedInput" type="text" placeholder="hh:mm am/pm" autocomplete="off">
          </div>
        </div>

        <!-- 6: Venue -->
        <div class="screen" data-screen="venue">
          <div class="screen-label">Venue</div>
          <input class="text-input" id="venueInput" type="text" placeholder="Type venue here (optional)" autocomplete="off">
        </div>

      </div>
    </div>

    <div class="nav">
      <button class="nav-btn hidden" id="prevBtn" onclick="navigate(-1)">
        <span class="material-symbols-outlined arrow">chevron_left</span>
        <span id="prevLabel">Back</span>
      </button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">
        <span id="nextLabel">Type</span>
        <span class="material-symbols-outlined arrow" id="nextIcon">chevron_right</span>
      </button>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <h2>Settings</h2>
      <button class="btn-google" id="googleAuthBtn" onclick="handleGoogleAuth()">Connect Google Calendar</button>
      <label>OpenRouter API Key</label>
      <input type="password" id="openrouterKey" placeholder="sk-or-...">
      <label>Vision Model</label>
      <select id="visionModel">
        <option value="anthropic/claude-sonnet-4">Claude Sonnet 4</option>
        <option value="anthropic/claude-haiku-4">Claude Haiku 4</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="google/gemini-flash-1.5">Gemini Flash</option>
      </select>
      <label>Google Client ID</label>
      <input type="text" id="googleClientId" placeholder="xxxxx.apps.googleusercontent.com">
      <div class="btn-row">
        <button class="btn-cancel" onclick="toggleSettings()">Cancel</button>
        <button class="btn-save" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ALL_SCREENS = ['title', 'eventType', 'fullDay', 'dateStart', 'dateEnd', 'timeStart', 'timeEnd', 'venue'];
    const SCREEN_LABELS = {
      title: 'Title', eventType: 'Event Type', fullDay: 'Full Day?',
      dateStart: 'Date (Start)', dateEnd: 'Date (End)',
      timeStart: 'Time (Start)', timeEnd: 'Time (End)', venue: 'Venue'
    };

    let eventType = 'single';
    let isFullDay = true;
    let flowIndex = 0;
    const canvases = {};
    let googleAccessToken = sessionStorage.getItem('googleAccessToken');

    function getFlow() {
      const flow = ['title', 'eventType', 'fullDay', 'dateStart'];
      if (eventType === 'multi') flow.push('dateEnd');
      if (!isFullDay) { flow.push('timeStart', 'timeEnd'); }
      flow.push('venue');
      return flow;
    }

    function currentScreenId() {
      return getFlow()[flowIndex];
    }

    function screenDomIndex(screenId) {
      return ALL_SCREENS.indexOf(screenId);
    }

    function selectEventType(type) {
      eventType = type;
      const screen = document.querySelector('[data-screen="eventType"]');
      screen.querySelectorAll('.radio-option').forEach((opt, i) => {
        opt.classList.toggle('selected', (i === 0 && type === 'single') || (i === 1 && type === 'multi'));
      });
    }

    function selectFullDay(val) {
      isFullDay = val;
      document.getElementById('fullDayYes').classList.toggle('selected', val);
      document.getElementById('fullDayNo').classList.toggle('selected', !val);
    }

    function navigate(dir) {
      const flow = getFlow();
      const screenId = currentScreenId();

      if (dir === 1 && screenId === 'title') {
        const title = document.getElementById('titleInput').value.trim();
        if (!title) { showToast('Please enter a title'); return; }
      }

      if (dir === 1 && screenId === 'venue') {
        submitEvent();
        return;
      }

      const next = flowIndex + dir;
      if (next < 0 || next >= flow.length) return;

      flowIndex = next;
      updateUI();
    }

    function updateUI() {
      const flow = getFlow();
      const screenId = currentScreenId();
      const domIdx = screenDomIndex(screenId);

      document.getElementById('screens').style.transform = `translateX(-${domIdx * 100}%)`;

      // Progress bar
      const bar = document.getElementById('progressBar');
      bar.innerHTML = '';
      for (let i = 0; i < flow.length; i++) {
        const seg = document.createElement('div');
        seg.className = 'progress-seg' + (i <= flowIndex ? ' active' : '');
        bar.appendChild(seg);
      }

      // Nav buttons
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      prevBtn.classList.toggle('hidden', flowIndex === 0);
      if (flowIndex > 0) {
        document.getElementById('prevLabel').textContent = SCREEN_LABELS[flow[flowIndex - 1]] || '';
      }

      const nextIcon = document.getElementById('nextIcon');
      if (screenId === 'venue') {
        nextBtn.classList.add('submit');
        document.getElementById('nextLabel').textContent = 'Submit';
        nextIcon.textContent = 'check';
      } else {
        nextBtn.classList.remove('submit');
        document.getElementById('nextLabel').textContent = SCREEN_LABELS[flow[flowIndex + 1]] || '';
        nextIcon.textContent = 'chevron_right';
      }
    }

    const inputModes = { dateStart: 'handwrite', dateEnd: 'handwrite', timeStart: 'handwrite', timeEnd: 'handwrite' };

    function setInputMode(field, mode) {
      inputModes[field] = mode;
      document.getElementById(`${field}Handwrite`).classList.toggle('active', mode === 'handwrite');
      document.getElementById(`${field}Type`).classList.toggle('active', mode === 'type');
      const screen = document.querySelector(`[data-screen="${field}"]`);
      screen.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim().toLowerCase() === (mode === 'handwrite' ? 'write' : 'type'));
      });
    }

    function getFieldValue(field) {
      if (inputModes[field] === 'type') {
        return document.getElementById(`${field}TypedInput`).value.trim();
      }
      return document.getElementById(`${field}Value`).textContent.trim();
    }

    function initCanvas(name) {
      const container = document.getElementById(`${name}CanvasContainer`);
      if (!container) return;
      const canvas = document.getElementById(`${name}Canvas`);
      const ctx = canvas.getContext('2d');

      function resize() {
        const rect = container.getBoundingClientRect();
        if (rect.width === 0) return;
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#6ee591';
      }

      resize();

      let drawing = false;
      let hasContent = false;

      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
      }

      function start(e) {
        e.preventDefault();
        drawing = true;
        container.classList.add('drawing');
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
      }

      function move(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        if (!hasContent) {
          hasContent = true;
          container.classList.add('has-content');
        }
      }

      function end() {
        if (drawing) {
          drawing = false;
          container.classList.remove('drawing');
          ctx.closePath();
        }
      }

      canvas.addEventListener('mousedown', start);
      canvas.addEventListener('mousemove', move);
      canvas.addEventListener('mouseup', end);
      canvas.addEventListener('mouseleave', end);
      canvas.addEventListener('touchstart', start, { passive: false });
      canvas.addEventListener('touchmove', move, { passive: false });
      canvas.addEventListener('touchend', end);

      canvases[name] = { canvas, ctx, container, resize, hasContent: () => hasContent, reset: () => { hasContent = false; } };
      window.addEventListener('resize', resize);
    }

    function clearCanvas(name) {
      const c = canvases[name];
      if (!c) return;
      const rect = c.container.getBoundingClientRect();
      c.ctx.clearRect(0, 0, rect.width, rect.height);
      c.container.classList.remove('has-content');
      c.reset();
      document.getElementById(`${name}Value`).textContent = '';
      document.getElementById(`${name}Value`).className = 'recognised-value';
    }

    async function recognise(name) {
      const settings = loadSettings();
      if (!settings.openrouterKey) {
        showToast('Set OpenRouter API key in settings');
        return;
      }

      const c = canvases[name];
      if (!c || !c.hasContent()) {
        showToast('Write something first');
        return;
      }

      const valueEl = document.getElementById(`${name}Value`);
      valueEl.textContent = 'Recognising...';
      valueEl.className = 'recognised-value loading';

      const imageData = c.canvas.toDataURL('image/png');

      const isDate = name.startsWith('date');
      const prompt = isDate
        ? 'Read the handwritten date in this image. Return ONLY the date in dd/mm/yy format. Nothing else.'
        : 'Read the handwritten time in this image. Return ONLY the time in hh:mm am/pm format (e.g. 2:30 pm). Nothing else.';

      try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${settings.openrouterKey}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: settings.visionModel || 'anthropic/claude-sonnet-4',
            messages: [{ role: 'user', content: [
              { type: 'text', text: prompt },
              { type: 'image_url', image_url: { url: imageData } }
            ]}],
            max_tokens: 30,
          })
        });

        const data = await res.json();
        const result = data.choices?.[0]?.message?.content?.trim();

        if (result) {
          valueEl.textContent = result;
          valueEl.className = 'recognised-value';
        } else {
          valueEl.textContent = 'Could not recognise';
          valueEl.className = 'recognised-value loading';
        }
      } catch (err) {
        valueEl.textContent = 'Error — check API key';
        valueEl.className = 'recognised-value loading';
        console.error(err);
      }
    }

    function handleGoogleAuth() {
      const settings = loadSettings();
      if (!settings.googleClientId) {
        showToast('Set Google Client ID in settings first');
        return;
      }
      const redirectUri = window.location.origin + window.location.pathname;
      const scope = 'https://www.googleapis.com/auth/calendar.events';
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(settings.googleClientId)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(scope)}&prompt=consent`;
      window.location.href = authUrl;
    }

    function checkAuthRedirect() {
      const hash = window.location.hash;
      if (hash.includes('access_token')) {
        const params = new URLSearchParams(hash.substring(1));
        googleAccessToken = params.get('access_token');
        sessionStorage.setItem('googleAccessToken', googleAccessToken);
        window.location.hash = '';
        updateGoogleButton(true);
        showToast('Google Calendar connected');
      }
    }

    function updateGoogleButton(connected) {
      const btn = document.getElementById('googleAuthBtn');
      if (connected) {
        btn.textContent = 'Connected ✓';
        btn.classList.add('connected');
      } else {
        btn.textContent = 'Connect Google Calendar';
        btn.classList.remove('connected');
      }
    }

    function parseDate(str) {
      const m = str.match(/(\d{1,2})\D(\d{1,2})\D(\d{2,4})/);
      if (!m) return null;
      let [, day, month, year] = m;
      day = parseInt(day); month = parseInt(month) - 1; year = parseInt(year);
      if (year < 100) year += 2000;
      return { day, month, year };
    }

    function parseTime(str) {
      const m = str.match(/(\d{1,2})\D(\d{2})\s*(am|pm)?/i);
      if (!m) return null;
      let [, hours, minutes, ampm] = m;
      hours = parseInt(hours); minutes = parseInt(minutes);
      if (ampm) {
        if (ampm.toLowerCase() === 'pm' && hours !== 12) hours += 12;
        if (ampm.toLowerCase() === 'am' && hours === 12) hours = 0;
      }
      return { hours, minutes };
    }

    async function submitEvent() {
      if (!googleAccessToken) {
        showToast('Connect Google Calendar first');
        toggleSettings();
        return;
      }

      const title = document.getElementById('titleInput').value.trim();
      const dateStartStr = getFieldValue('dateStart');
      const venue = document.getElementById('venueInput').value.trim();

      if (!title) { showToast('Title is required'); return; }

      const isInvalid = (v) => !v || v.includes('...') || v.includes('Error') || v.includes('Could not');

      if (isInvalid(dateStartStr)) { showToast('Please enter the start date'); return; }

      const startDate = parseDate(dateStartStr);
      if (!startDate) { showToast('Could not parse start date'); return; }

      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      let event;

      if (isFullDay) {
        const startStr = `${startDate.year}-${String(startDate.month + 1).padStart(2, '0')}-${String(startDate.day).padStart(2, '0')}`;

        let endStr;
        if (eventType === 'multi') {
          const dateEndStr = getFieldValue('dateEnd');
          if (isInvalid(dateEndStr)) { showToast('Please enter the end date'); return; }
          const endDate = parseDate(dateEndStr);
          if (!endDate) { showToast('Could not parse end date'); return; }
          const endDT = new Date(endDate.year, endDate.month, endDate.day + 1);
          endStr = `${endDT.getFullYear()}-${String(endDT.getMonth() + 1).padStart(2, '0')}-${String(endDT.getDate()).padStart(2, '0')}`;
        } else {
          const endDT = new Date(startDate.year, startDate.month, startDate.day + 1);
          endStr = `${endDT.getFullYear()}-${String(endDT.getMonth() + 1).padStart(2, '0')}-${String(endDT.getDate()).padStart(2, '0')}`;
        }

        event = {
          summary: title,
          start: { date: startStr },
          end: { date: endStr },
        };
      } else {
        const timeStartStr = getFieldValue('timeStart');
        const timeEndStr = getFieldValue('timeEnd');
        if (isInvalid(timeStartStr)) { showToast('Please enter the start time'); return; }
        if (isInvalid(timeEndStr)) { showToast('Please enter the end time'); return; }

        const startTime = parseTime(timeStartStr);
        const endTime = parseTime(timeEndStr);
        if (!startTime || !endTime) { showToast('Could not parse time'); return; }

        let endDate;
        if (eventType === 'multi') {
          const dateEndStr = getFieldValue('dateEnd');
          if (isInvalid(dateEndStr)) { showToast('Please enter the end date'); return; }
          endDate = parseDate(dateEndStr);
          if (!endDate) { showToast('Could not parse end date'); return; }
        } else {
          endDate = startDate;
        }

        const startDT = new Date(startDate.year, startDate.month, startDate.day, startTime.hours, startTime.minutes);
        const endDT = new Date(endDate.year, endDate.month, endDate.day, endTime.hours, endTime.minutes);

        event = {
          summary: title,
          start: { dateTime: startDT.toISOString(), timeZone: tz },
          end: { dateTime: endDT.toISOString(), timeZone: tz },
        };
      }

      if (venue) event.location = venue;

      try {
        showToast('Creating event...');
        const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${googleAccessToken}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(event),
        });

        if (res.ok) {
          showToast('Event created!');
          setTimeout(resetForm, 1500);
        } else {
          const err = await res.json();
          if (res.status === 401) {
            googleAccessToken = null;
            sessionStorage.removeItem('googleAccessToken');
            updateGoogleButton(false);
            showToast('Session expired — reconnect Google');
          } else {
            showToast('Failed: ' + (err.error?.message || 'Unknown error'));
          }
        }
      } catch (err) {
        showToast('Network error');
        console.error(err);
      }
    }

    function resetForm() {
      document.getElementById('titleInput').value = '';
      document.getElementById('venueInput').value = '';
      ['dateStart', 'dateEnd', 'timeStart', 'timeEnd'].forEach(f => {
        clearCanvas(f);
        const typedInput = document.getElementById(`${f}TypedInput`);
        if (typedInput) typedInput.value = '';
      });
      eventType = 'single';
      isFullDay = true;
      selectEventType('single');
      selectFullDay(true);
      flowIndex = 0;
      updateUI();
    }

    function loadSettings() {
      try { return JSON.parse(localStorage.getItem('calendarUpdateSettings') || '{}'); }
      catch { return {}; }
    }

    function saveSettings() {
      const settings = {
        openrouterKey: document.getElementById('openrouterKey').value.trim(),
        visionModel: document.getElementById('visionModel').value,
        googleClientId: document.getElementById('googleClientId').value.trim(),
      };
      localStorage.setItem('calendarUpdateSettings', JSON.stringify(settings));
      toggleSettings();
      showToast('Settings saved');
    }

    function populateSettings() {
      const settings = loadSettings();
      document.getElementById('openrouterKey').value = settings.openrouterKey || '';
      document.getElementById('visionModel').value = settings.visionModel || 'anthropic/claude-sonnet-4';
      document.getElementById('googleClientId').value = settings.googleClientId || '';
    }

    function toggleSettings() {
      const overlay = document.getElementById('settingsOverlay');
      const isOpen = overlay.classList.contains('open');
      if (!isOpen) populateSettings();
      overlay.classList.toggle('open');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    let touchStartX = 0, touchStartY = 0;
    document.querySelector('.screens-wrapper').addEventListener('touchstart', (e) => {
      if (e.target.tagName === 'CANVAS') return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    document.querySelector('.screens-wrapper').addEventListener('touchend', (e) => {
      if (e.target.tagName === 'CANVAS') return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        navigate(dx < 0 ? 1 : -1);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      ['dateStart', 'dateEnd', 'timeStart', 'timeEnd'].forEach(initCanvas);
      updateUI();
      checkAuthRedirect();
      if (googleAccessToken) updateGoogleButton(true);
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    });
  </script>

  <script id="shader-fragment" type="x-shader/x-fragment">
    precision highp float;
    uniform float u_time;
    uniform vec2 u_resolution;

    void main() {
      vec2 uv = gl_FragCoord.xy / u_resolution.xy;
      float time = u_time * 0.5;

      vec3 color1 = vec3(0.02, 0.08, 0.04);
      vec3 color2 = vec3(0.0, 0.43, 0.21);
      vec3 color3 = vec3(0.43, 0.90, 0.57);

      float noise = sin(uv.x * 10.0 + time) * cos(uv.y * 10.0 - time) * 0.5 + 0.5;
      float aurora = sin(uv.x * 3.0 + uv.y * 5.0 + time * 0.8) * 0.5 + 0.5;
      aurora *= pow(1.0 - uv.y, 1.5);

      vec3 finalColor = mix(color1, color2, aurora);
      finalColor += color3 * pow(aurora, 8.0) * 0.5;

      gl_FragColor = vec4(finalColor, 1.0);
    }
  </script>

  <script>
    (function() {
      const c = document.getElementById('bg-canvas');
      const gl = c.getContext('webgl');
      if (!gl) return;

      const vs = gl.createShader(gl.VERTEX_SHADER);
      gl.shaderSource(vs, 'attribute vec2 position;void main(){gl_Position=vec4(position,0.0,1.0);}');
      gl.compileShader(vs);

      const fs = gl.createShader(gl.FRAGMENT_SHADER);
      gl.shaderSource(fs, document.getElementById('shader-fragment').text);
      gl.compileShader(fs);

      const prog = gl.createProgram();
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      gl.useProgram(prog);

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

      const pos = gl.getAttribLocation(prog, 'position');
      gl.enableVertexAttribArray(pos);
      gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

      const tLoc = gl.getUniformLocation(prog, 'u_time');
      const rLoc = gl.getUniformLocation(prog, 'u_resolution');

      function render(t) {
        if (c.width !== window.innerWidth || c.height !== window.innerHeight) {
          c.width = window.innerWidth;
          c.height = window.innerHeight;
          gl.viewport(0, 0, c.width, c.height);
        }
        gl.uniform1f(tLoc, t * 0.001);
        gl.uniform2f(rLoc, c.width, c.height);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
      }
      requestAnimationFrame(render);
    })();
  </script>
